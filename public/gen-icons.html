<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Nutrainer — Générateur d'icônes</title>
<style>
  body { margin: 0; background: #111; color: #c8b890; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 32px; }
  h1 { font-size: 1rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
  .previews { display: flex; gap: 32px; align-items: flex-end; }
  .preview { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .preview span { font-size: 0.7rem; color: #5a5a4a; letter-spacing: 2px; }
  canvas { border-radius: 20%; border: 1px solid #2a2a2a; }
  button { background: #c8b890; color: #0d0d0d; border: none; border-radius: 8px; padding: 10px 22px; font-family: monospace; font-size: 0.75rem; letter-spacing: 1px; cursor: pointer; font-weight: bold; }
  button:hover { background: #f0e6c8; }
  .actions { display: flex; gap: 12px; }
</style>
</head>
<body>
<h1>Nutrainer — Icônes</h1>

<div class="previews">
  <div class="preview">
    <canvas id="c512" width="512" height="512"></canvas>
    <span>512 × 512</span>
  </div>
  <div class="preview">
    <canvas id="c192" width="192" height="192" style="width:96px;height:96px"></canvas>
    <span>192 × 192</span>
  </div>
  <div class="preview">
    <canvas id="c32" width="32" height="32" style="width:64px;height:64px"></canvas>
    <span>32 × 32 (favicon)</span>
  </div>
</div>

<div class="actions">
  <button onclick="download('c512','icon.png')">⬇ icon.png (512)</button>
  <button onclick="download('c192','icon-192.png')">⬇ icon-192.png</button>
  <button onclick="download('c32','favicon.png')">⬇ favicon.png</button>
</div>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const r = s * 0.195; // corner radius

  // Background rounded rect
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();

  const bgGrad = ctx.createLinearGradient(0, 0, s, s);
  bgGrad.addColorStop(0, '#1a1a14');
  bgGrad.addColorStop(1, '#0d0d0d');
  ctx.fillStyle = bgGrad;
  ctx.fill();

  // Subtle border
  ctx.strokeStyle = '#2a2a1e';
  ctx.lineWidth = s * 0.012;
  ctx.stroke();

  // Gold gradient for N
  const goldGrad = ctx.createLinearGradient(0, 0, s * 0.3, s);
  goldGrad.addColorStop(0, '#f0e6c8');
  goldGrad.addColorStop(1, '#a89050');

  const pad = s * 0.16;
  const barW = s * 0.148;
  const height = s - pad * 2;

  ctx.fillStyle = goldGrad;

  // Left vertical bar
  roundRect(ctx, pad, pad, barW, height, s * 0.022);

  // Right vertical bar
  roundRect(ctx, s - pad - barW, pad, barW, height, s * 0.022);

  // Diagonal stroke
  ctx.beginPath();
  ctx.moveTo(pad, pad);
  ctx.lineTo(pad + barW, pad);
  ctx.lineTo(s - pad, s - pad);
  ctx.lineTo(s - pad - barW, s - pad);
  ctx.closePath();
  ctx.fill();

  // Small accent dot
  ctx.beginPath();
  ctx.arc(s * 0.78, s * 0.22, s * 0.035, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(200,184,144,0.35)';
  ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function download(id, filename) {
  const canvas = document.getElementById(id);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c32'));
</script>
</body>
</html>
